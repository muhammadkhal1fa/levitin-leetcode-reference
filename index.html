<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Levitin Algorithms → LeetCode Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --muted: #6b7089;
  --subtle: #3a3f52;
  --easy: #4ade80;
  --easy-bg: rgba(74,222,128,0.1);
  --medium: #fb923c;
  --medium-bg: rgba(251,146,60,0.1);
  --hard: #f87171;
  --hard-bg: rgba(248,113,113,0.1);
  --accent: #818cf8;
  --accent-bg: rgba(129,140,248,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── HEADER ── */
header {
  padding: 48px 40px 36px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  backdrop-filter: blur(12px);
}
.header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.header-text h1 {
  font-size: clamp(22px, 3vw, 34px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
}
.header-text h1 span { color: var(--accent); }
.header-text p { margin-top: 8px; color: var(--muted); font-size: 13px; font-weight: 300; }
.header-stats { display: flex; gap: 20px; }
.hstat { text-align: center; }
.hstat-n { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 600; color: var(--accent); }
.hstat-l { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }

/* ── LAYOUT ── */
.layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 110px); }

/* ── SIDEBAR ── */
nav {
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 110px;
  height: calc(100vh - 110px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--subtle) transparent;
}
.nav-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  padding: 0 20px 10px;
  font-weight: 600;
}
.nav-item {
  display: block;
  padding: 10px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.2s ease;
  text-decoration: none;
}
.nav-item:hover { background: var(--surface); border-left-color: var(--subtle); }
.nav-item.active { background: var(--surface); border-left-color: var(--accent); }
.nav-ch { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 2px; }
.nav-name { font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.3; }
.nav-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── MAIN CONTENT ── */
main { padding: 32px 40px; overflow-y: auto; }

.tech-section {
  margin-bottom: 64px;
  scroll-margin-top: 130px;
}
.tech-header {
  display: flex; align-items: flex-start; gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.tech-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid rgba(129,140,248,0.25);
  padding: 4px 10px;
  border-radius: 4px;
  white-space: nowrap;
  margin-top: 3px;
}
.tech-info h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.tech-info p { font-size: 12.5px; color: var(--muted); margin-top: 4px; font-weight: 300; }

/* ── DIFFICULTY GROUPS ── */
.diff-group { margin-bottom: 20px; }
.diff-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.diff-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 12px;
  border-radius: 20px;
}
.diff-pill.easy { background: var(--easy-bg); color: var(--easy); }
.diff-pill.medium { background: var(--medium-bg); color: var(--medium); }
.diff-pill.hard { background: var(--hard-bg); color: var(--hard); }
.diff-count { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

/* ── PROBLEM GRID ── */
.problems-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
.prob-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.18s ease;
  cursor: pointer;
}
.prob-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
.prob-card:hover .prob-num { color: var(--accent); }
.prob-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  min-width: 36px;
  transition: color 0.18s;
}
.prob-name { font-size: 12.5px; font-weight: 400; flex: 1; line-height: 1.3; }
.prob-arrow { font-size: 12px; color: var(--subtle); transition: color 0.18s; }
.prob-card:hover .prob-arrow { color: var(--accent); }

/* ── TECH SUMMARY BAR ── */
.tech-summary {
  display: flex; gap: 12px;
  margin-top: 20px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.ts-item { display: flex; align-items: center; gap: 8px; }
.ts-dot { width: 8px; height: 8px; border-radius: 50%; }
.ts-dot.easy { background: var(--easy); }
.ts-dot.medium { background: var(--medium); }
.ts-dot.hard { background: var(--hard); }
.ts-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.ts-text .n { font-weight: 600; }
.ts-sep { width: 1px; background: var(--border2); margin: 0 4px; }

/* ── SEARCH ── */
.search-wrap { padding: 0 20px 16px; }
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--accent); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--subtle); border-radius: 10px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  nav { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  header { padding: 24px 20px 20px; }
  main { padding: 24px 20px; }
  .header-inner { flex-direction: column; align-items: flex-start; }
}

/* ── FADE IN ── */
.tech-section { animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>

        { n: 131, t: 'Palindrome Partitioning', s: 'palindrome-partitioning' },
        { n: 22,  t: 'Generate Parentheses', s: 'generate-parentheses' },
      ],
      hard: [
        { n: 51,  t: 'N-Queens', s: 'n-queens' },
        { n: 37,  t: 'Sudoku Solver', s: 'sudoku-solver' },
        { n: 212, t: 'Word Search II', s: 'word-search-ii' },
        { n: 52,  t: 'N-Queens II', s: 'n-queens-ii' },
        { n: 10,  t: 'Regular Expression Matching', s: 'regular-expression-matching' },
      ]
    }
  }
];

function countProblems(t) {
  return (t.problems.easy||[]).length + (t.problems.medium||[]).length + (t.problems.hard||[]).length;
}

let totalProblems = 0;
techniques.forEach(t => totalProblems += countProblems(t));
document.getElementById('total-count').textContent = totalProblems;

// Build sidebar nav
const sidebar = document.getElementById('sidebar');
techniques.forEach(t => {
  const a = document.createElement('a');
  a.className = 'nav-item';
  a.href = '#' + t.id;
  a.dataset.id = t.id;
  const cnt = countProblems(t);
  a.innerHTML = `<div class="nav-ch">${t.chapter}</div><div class="nav-name">${t.name}</div><div class="nav-count">${cnt} problems</div>`;
  sidebar.appendChild(a);
});

// Build main content
const mainEl = document.getElementById('main-content');
techniques.forEach((t, i) => {
  const sec = document.createElement('section');
  sec.className = 'tech-section';
  sec.id = t.id;
  sec.style.animationDelay = (i * 0.04) + 's';

  const cnt = countProblems(t);
  const eLen = (t.problems.easy||[]).length;
  const mLen = (t.problems.medium||[]).length;
  const hLen = (t.problems.hard||[]).length;

  let diffSections = '';
  ['easy','medium','hard'].forEach(diff => {
    const probs = t.problems[diff] || [];
    if(!probs.length) return;
    const cards = probs.map(p =>
      `<a class="prob-card" href="https://leetcode.com/problems/${p.s}/" target="_blank" rel="noopener">
        <span class="prob-num">#${p.n}</span>
        <span class="prob-name">${p.t}</span>
        <span class="prob-arrow">↗</span>
      </a>`
    ).join('');
    diffSections += `
      <div class="diff-group">
        <div class="diff-header">
          <span class="diff-pill ${diff}">${diff.charAt(0).toUpperCase()+diff.slice(1)}</span>
          <span class="diff-count">${probs.length} problem${probs.length>1?'s':''}</span>
        </div>
        <div class="problems-grid">${cards}</div>
      </div>`;
  });

  sec.innerHTML = `
    <div class="tech-header">
      <span class="tech-badge">${t.chapter}</span>
      <div class="tech-info">
        <h2>${t.name}</h2>
        <p>${t.desc}</p>
      </div>
    </div>
    ${diffSections}
    <div class="tech-summary">
      <div class="ts-item"><div class="ts-dot easy"></div><span class="ts-text"><span class="n">${eLen}</span> Easy</span></div>
      <div class="ts-sep"></div>
      <div class="ts-item"><div class="ts-dot medium"></div><span class="ts-text"><span class="n">${mLen}</span> Medium</span></div>
      <div class="ts-sep"></div>
      <div class="ts-item"><div class="ts-dot hard"></div><span class="ts-text"><span class="n">${hLen}</span> Hard</span></div>
      <div class="ts-sep"></div>
      <div class="ts-item"><span class="ts-text" style="color:#818cf8"><span class="n">${cnt}</span> Total</span></div>
    </div>`;
  mainEl.appendChild(sec);
});

// Active nav highlight on scroll
const sections = document.querySelectorAll('.tech-section');
const navItems = document.querySelectorAll('.nav-item');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) {
      navItems.forEach(n => n.classList.remove('active'));
      const active = document.querySelector(`.nav-item[data-id="${e.target.id}"]`);
      if(active) { active.classList.add('active'); active.scrollIntoView({block:'nearest'}); }
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });
sections.forEach(s => observer.observe(s));

// Search / filter
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if(!q) {
    document.querySelectorAll('.prob-card').forEach(c => c.style.display = '');
    document.querySelectorAll('.diff-group').forEach(g => g.style.display = '');
    document.querySelectorAll('.tech-section').forEach(s => s.style.display = '');
    return;
  }
  document.querySelectorAll('.tech-section').forEach(sec => {
    let secVisible = false;
    sec.querySelectorAll('.diff-group').forEach(grp => {
      let grpVisible = false;
      grp.querySelectorAll('.prob-card').forEach(card => {
        const name = card.querySelector('.prob-name').textContent.toLowerCase();
        const num = card.querySelector('.prob-num').textContent.toLowerCase();
        const visible = name.includes(q) || num.includes(q);
        card.style.display = visible ? '' : 'none';
        if(visible) grpVisible = true;
      });
      grp.style.display = grpVisible ? '' : 'none';
      if(grpVisible) secVisible = true;
    });
    sec.style.display = secVisible ? '' : 'none';
  });
});
</script>
</body>
</html>
